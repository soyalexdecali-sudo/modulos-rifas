<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifa Interactiva Premium</title>
    <style>
      body { 
        font-family: 'Arial Black', Gadget, sans-serif;
        margin: 0; 
        padding: 20px; 
        background: linear-gradient(rgba(10, 16, 12, 0.85), rgba(5, 8, 6, 0.95)), 
                    url('https://images.unsplash.com/photo-1606836591695-4d58a73ef1e5?q=80&w=1470&auto=format&fit=crop') no-repeat center center fixed;
        background-size: cover;
        color: #fff;
        display: flex; 
        flex-wrap: wrap; 
        gap: 20px; 
        justify-content: center; 
      }
      
      .contenedor-tablero { 
        background: rgba(13, 20, 15, 0.90);
        border: 3px solid #d4af37; 
        border-radius: 15px; 
        padding: 20px; 
        width: 100%; 
        max-width: 620px; 
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        box-sizing: border-box;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      
      .encabezado { 
        text-align: center;
        margin-bottom: 20px; 
        border-bottom: 2px dashed #d4af37; 
        padding-bottom: 15px; 
      }
      
      .encabezado h1 { 
        font-size: 28px;
        color: #f3ca52; 
        margin: 0 0 5px 0; 
        text-shadow: 2px 2px 4px #000;
        letter-spacing: 1px;
      }
      
      .encabezado p { 
        font-size: 13px;
        color: #a3b899; 
        margin: 5px 0; 
        font-family: Arial, sans-serif; 
        font-weight: bold;
      }
      
      .info-rifa {
        display: flex;
        justify-content: space-around;
        margin-top: 10px;
        background: rgba(0,0,0,0.4);
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(212, 175, 55, 0.2);
      }

      .info-item {
        font-size: 12px;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .info-item span {
        color: #f3ca52;
        font-weight: bold;
      }

      .tablero-grid { 
        display: grid; 
        grid-template-columns: repeat(10, 1fr); 
        gap: 6px;
      }
      
      .numero-casilla { 
        aspect-ratio: 1; 
        border: 2px solid #555; 
        border-radius: 6px; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer; 
        display: flex;
        align-items: center; 
        justify-content: center; 
        transition: all 0.2s; 
        font-family: 'Impact', Gadget, sans-serif; 
        user-select: none; 
      }
      
      .libre { 
        background: linear-gradient(135deg, #1e293b, #0f172a);
        color: #38bdf8; 
        border-color: #38bdf8; 
      }
      
      .libre:hover { 
        background: #38bdf8; 
        color: #000; 
        transform: scale(1.1); 
        box-shadow: 0 0 10px #38bdf8; 
      }
      
      .ocupado { 
        background: #b91c1c; 
        color: #fff; 
        border-color: #b91c1c; 
        cursor: not-allowed; 
        opacity: 0.7; 
      }
      
      .seleccionado { 
        background: #d4af37 !important; 
        color: #000 !important; 
        border-color: #fff !important; 
        transform: scale(1.05); 
        box-shadow: 0 0 12px #d4af37; 
      }
      
      .contenedor-formulario { 
        background: rgba(10, 15, 11, 0.95);
        border: 3px solid #d4af37; 
        border-radius: 15px; 
        padding: 20px; 
        width: 100%; 
        max-width: 400px; 
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        box-sizing: border-box;
        height: fit-content;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      
      .formulario-titulo { 
        font-family: 'Impact', Gadget, sans-serif;
        color: #d4af37; 
        font-size: 22px; 
        text-align: center; 
        margin-top: 0; 
        margin-bottom: 15px;
        border-bottom: 1px solid #d4af37;
        padding-bottom: 5px;
      }
      
      .grupo-campo { 
        margin-bottom: 12px; 
      }
      
      .grupo-campo label { 
        display: block; 
        font-size: 12px; 
        color: #ccc; 
        margin-bottom: 4px;
        font-family: Arial, sans-serif;
        font-weight: bold;
      }
      
      .grupo-campo input { 
        width: 100%; 
        padding: 10px; 
        border: 1px solid #444; 
        border-radius: 6px; 
        background: #000; 
        color: #fff; 
        box-sizing: border-box; 
        font-size: 14px; 
        font-family: Arial, sans-serif;
      }
      
      .grupo-campo input:focus { 
        border-color: #d4af37; 
        outline: none; 
      }
      
      .btn-enviar { 
        width: 100%; 
        padding: 12px; 
        background: #d4af37; 
        color: #000; 
        border: none; 
        border-radius: 6px; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer; 
        margin-top: 10px;
        transition: background 0.2s;
      }
      
      .btn-enviar:hover { 
        background: #f3ca52; 
      }
      
      #loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-size: 20px;
        color: #d4af37;
        font-family: Arial, sans-serif;
      }
      
      @media(max-width: 768px) {
        body { padding: 10px; gap: 15px; }
        .tablero-grid { gap: 4px; }
        .numero-casilla { font-size: 14px; }
        .encabezado h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    
    <div id="loader">Cargando Tablero Oficial...</div>

    <div class="contenedor-tablero" id="panelTablero">
      <div class="encabezado">
        <h1 id="txtTitulo">Cargando...</h1>
        <p id="txtDescripcion">Por favor espera un momento...</p>
        
        <div class="info-rifa">
          <div class="info-item">Fecha: <span id="lblFecha">--/--/----</span></div>
          <div class="info-item">Valor: <span id="lblPrecio">$0</span></div>
        </div>
      </div>
      
      <div class="tablero-grid" id="gridNumeros"></div>
    </div>

    <div class="contenedor-formulario" id="panelFormulario">
      <div class="formulario-titulo">RESERVAR NÚMERO</div>
      <form id="formularioTicket" onsubmit="procesarFormulario(event)">
        <div class="grupo-campo">
          <label>Número Seleccionado</label>
          <input type="text" id="numVisual" readonly placeholder="Ninguno" style="color:#f3ca52; font-weight:bold; text-align:center; background:#111; font-size:16px;">
          <input type="hidden" id="numSeleccionado">
        </div>
        <div class="grupo-campo">
          <label>Nombre Completo</label>
          <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
        </div>
        <div class="grupo-campo">
          <label>Teléfono Celular</label>
          <input type="text" id="telefono" required placeholder="Ej: 3157778899">
        </div>
        <div class="grupo-campo">
          <label>Correo Electrónico</label>
          <input type="email" id="correo" required placeholder="Ej: juan@gmail.com">
        </div>
        
        <button type="submit" class="btn-enviar">RESERVAR AHORA</button>
      </form>
    </div>

    <script>
      const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbzdfV4SiVyiJo_jcq-O2qaaos4XQq_mAPnf6BPU6h8ITSXE3fQl83FQxXZ7SNl1YRiY/exec"; 
      let numeroElegidoActualmente = null;

      window.addEventListener("DOMContentLoaded", () => {
        actualizarTableroReal();
      });

      function actualizarTableroReal() {
        document.getElementById("loader").style.display = "flex";
        
        // 1. OBTENER CONFIGURACIONES DE TEXTOS Y COLORES SINCRO DESDE EL SHEET
        fetch(`${URL_WEB_APP}?accion=obtener_menu`)
          .then(res => res.json())
          .then(menu => {
            document.getElementById("txtTitulo").innerText = menu.primerRenglon;
            document.getElementById("txtDescripcion").innerText = menu.restoTexto;
            document.getElementById("lblFecha").innerText = menu.fecha;
            document.getElementById("lblPrecio").innerText = (typeof menu.precio === 'number') ? `$${menu.precio.toLocaleString('es-CO')}` : `$${menu.precio}`;
            
            // ASIGNACIÓN DINÁMICA DE LOS ESTILOS DE COLOR (MAPEADOS A LAS NUEVAS CELDAS)
            if (menu.fondoFormulario) {
              document.getElementById("panelTablero").style.backgroundColor = menu.fondoFormulario;
              document.getElementById("panelFormulario").style.backgroundColor = menu.fondoFormulario;
            }
            if (menu.colorFuentes) {
              document.getElementById("panelTablero").style.color = menu.colorFuentes;
              document.getElementById("panelFormulario").style.color = menu.colorFuentes;
              
              document.querySelectorAll(".info-item").forEach(el => el.style.color = menu.colorFuentes);
              document.querySelectorAll(".grupo-campo label").forEach(el => el.style.color = menu.colorFuentes);
            }

            // 2. CONSTRUIR MAPA DE NÚMEROS
            return fetch(`${URL_WEB_APP}?accion=obtener_tablero`);
          })
          .then(res => res.json())
          .then(tablero => {
            const contenedorGrid = document.getElementById("gridNumeros");
            contenedorGrid.innerHTML = "";
            numeroElegidoActualmente = null;

            for (let n = 0; n <= 99; n++) {
              const divCasilla = document.createElement("div");
              divCasilla.classList.add("numero-casilla");
              divCasilla.innerText = String(n).padStart(2, "0");

              const estaOcupado = tablero[n] === true;

              if (estaOcupado) {
                divCasilla.classList.add("ocupado");
              } else {
                divCasilla.classList.add("libre");
                divCasilla.addEventListener("click", () => {
                  seleccionarNumeroCasilla(n, divCasilla);
                });
              }
              contenedorGrid.appendChild(divCasilla);
            }
            document.getElementById("loader").style.display = "none";
          })
          .catch(err => {
            console.error("Error cargando el tablero:", err);
            document.getElementById("loader").style.display = "none";
          });
      }

      function seleccionarNumeroCasilla(numero, elementoHtml) {
        document.querySelectorAll(".numero-casilla").forEach(c => c.classList.remove("seleccionado"));
        elementoHtml.classList.add("seleccionado");
        
        numeroElegidoActualmente = numero;
        document.getElementById("numSeleccionado").value = numero;
        document.getElementById("numVisual").value = `Número: ${String(numero).padStart(2, "0")}`;
      }

      function procesarFormulario(e) {
        e.preventDefault();

        if (numeroElegidoActualmente === null) {
          alert("Por favor, selecciona primero un número libre del tablero.");
          return;
        }

        const nombre = document.getElementById("nombre").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const correo = document.getElementById("correo").value.trim();

        document.getElementById("loader").style.display = "flex";
        document.getElementById("loader").innerText = "Procesando registro en el servidor de Google...";

        const urlFinal = `${URL_WEB_APP}?accion=registrar_ticket&num1=${encodeURIComponent(numeroElegidoActualmente)}&nombre=${encodeURIComponent(nombre)}&telefono=${encodeURIComponent(telefono)}&correo=${encodeURIComponent(correo)}`;

        fetch(urlFinal)
          .then(res => res.json())
          .then(respuesta => {
            if (respuesta.status === "ok") {
              alert("¡Registro Exitoso!\nTu número ha sido reservado correctamente.");
              document.getElementById("numSeleccionado").value = "";
              document.getElementById("numVisual").value = "";
              document.getElementById("nombre").value = "";
              document.getElementById("telefono").value = "";
              document.getElementById("correo").value = "";
            } else if (respuesta.status === "error") {
              alert(respuesta.message);
            } else if (respuesta.status === "ocupado") {
              alert("Error:\nEl número ya fue tomado por otro usuario.");
            }
            actualizarTableroReal();
          })
          .catch(err => {
            alert("Ocurrió un inconveniente al procesar la reserva.");
            console.error(err);
            document.getElementById("loader").style.display = "none";
          });
      }
    </script>
  </body>
</html>
